spring:
  datasource:
    # Reads from database.properties for local dev.
    # When running in Docker / CI, override with env vars:
    #   DB_HOST, DB_PORT, DB_NAME, DB_USERNAME, DB_PASSWORD
    url: jdbc:mysql://${DB_HOST:${db.host}}:${DB_PORT:${db.port}}/${DB_NAME:${db.name}}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:${db.username}}
    password: ${DB_PASSWORD:${db.password}}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        #dialect: org.hibernate.dialect.MySQL8Dialect

  config:
    import: classpath:database.properties

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
  metrics:
    export:
      simple:
        enabled: true

# optionally set management server port (uncomment to use different port)
# management.server.port: 8081

# Swagger/OpenAPI Configuration
springdoc:
  api-docs:
    path: /v3/api-docs
    enabled: true
  swagger-ui:
    path: /swagger-ui.html
    enabled: true
    operations-sorter: method
    tags-sorter: alpha
    try-it-out-enabled: true
  show-actuator: false
  packages-to-scan: com.urviclean.recordbook.controllers
  paths-to-match: /api/**

